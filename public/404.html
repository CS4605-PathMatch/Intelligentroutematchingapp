<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // SPA redirect for GitHub Pages
      // Stores the current path in sessionStorage and redirects to index.html
      var path = window.location.pathname.replace('/Intelligentroutematchingapp', '') || '/';
      sessionStorage.setItem('redirect', path + window.location.search);
      window.location.replace('/Intelligentroutematchingapp/');
    </script>
  </head>
  <body></body>
</html>
